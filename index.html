<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Ostoslista</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 5px; padding: 8px; }
    input { padding: 8px; width: 70%; }
    li { padding: 8px; border: 1px solid #ccc; margin: 5px 0; cursor: grab; }
    .done { text-decoration: line-through; color: gray; }
    .active { background: lightblue; }
  </style>
</head>

<body>
  

<h2>Ostoslista</h2>

<!-- TABIT -->
<div>
  <button onclick="setCategory('Ruokakauppa')" id="tab-Ruokakauppa">Ruokakauppa</button>
  <button onclick="setCategory('Muut')" id="tab-Muut">Muut</button>
</div>

<br>

<input id="newItem" placeholder="Lisää ostos">
<button onclick="addItem()">Lisää</button>

<ul id="list"></ul>

<script>
const SUPABASE_URL = "https://nunttyodyavjjaswwskd.supabase.co" ;	
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51bnR0eW9keWF2amphc3d3c2tkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzEyODcsImV4cCI6MjA5NzM0NzI4N30.C6_pSgqkW2JKVCU478cmOnKQ7VD51joWGFML3W_vdjM";
 


// ✅ TÄRKEÄ: käytä eri nimeä kuin 'supabase'
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentCategory = "Ruokakauppa";
let items = [];

// 🔹 Lataa data
async function loadItems() {
  const { data, error } = await supabaseClient
    .from('shopping_list')
    .select('*')
    .eq('category', currentCategory)
    .order('position', { ascending: true });

  if (error) {
    console.error(error);
    return;
  }

  items = data || [];
  render();
}

// 🔹 Renderöi
function render() {
  const list = document.getElementById('list');
  list.innerHTML = "";

  items.forEach((item) => {
    const li = document.createElement('li');
    li.innerHTML = "";

const checkbox = document.createElement('input');
checkbox.type = "checkbox";
checkbox.checked = item.done;

checkbox.onchange = async (e) => {
  e.stopPropagation();

  await supabaseClient
    .from('shopping_list')
    .update({ done: checkbox.checked })
    .eq('id', item.id);

  loadItems();
};

const span = document.createElement('span');
span.textContent = item.name;

if (item.done) {
  span.classList.add('done');
}

li.appendChild(checkbox);
li.appendChild(span);
    li.draggable = true;

    if (item.done) li.classList.add('done');

    // toggle done
    li.onclick = async () => {
      await supabaseClient
        .from('shopping_list')
        .update({ done: !item.done })
        .eq('id', item.id);

      loadItems();
    };

    // drag start
    li.ondragstart = (e) => {
      e.dataTransfer.setData("text/plain", item.id);
    };

    // drag over
    li.ondragover = (e) => e.preventDefault();

    // drop
    li.ondrop = async (e) => {
      e.preventDefault();

      const draggedId = e.dataTransfer.getData("text/plain");

      const fromIndex = items.findIndex(i => i.id == draggedId);
      const toIndex = items.findIndex(i => i.id == item.id);

      const moved = items.splice(fromIndex, 1)[0];
      items.splice(toIndex, 0, moved);

      await updateOrder();
      render();
    };

    list.appendChild(li);
  });

  updateTabs();
}

// 🔹 Tallenna järjestys
async function updateOrder() {
  for (let i = 0; i < items.length; i++) {
    await supabaseClient
      .from('shopping_list')
      .update({ position: i })
      .eq('id', items[i].id);
  }
}

// 🔹 Lisää item
async function addItem() {
  const input = document.getElementById('newItem');
  const name = input.value.trim();
  if (!name) return;

  await supabaseClient
    .from('shopping_list')
    .insert([
      {
        name: name,
        done: false,
        category: currentCategory,
        position: items.length
      }
    ]);

  input.value = "";
  loadItems();
}

// 🔹 Vaihda kategoria
function setCategory(cat) {
  currentCategory = cat;
  loadItems();
}

// 🔹 Päivitä tab UI
function updateTabs() {
  document.getElementById('tab-Ruokakauppa').classList.remove('active');
  document.getElementById('tab-Muut').classList.remove('active');

  document.getElementById('tab-' + currentCategory).classList.add('active');
}

// start
loadItems();

</script>

</body>
</html>
